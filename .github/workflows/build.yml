name: Build Universal macOS App

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
  DERIVED_DATA_INTEL: ${{ github.workspace }}/build/DerivedData-intel
  DERIVED_DATA_ARM64: ${{ github.workspace }}/build/DerivedData-arm64
  APP_OUTPUT_DIR: ${{ github.workspace }}/build/Release
  UNSIGNED_INTEL_APP: ${{ github.workspace }}/build/Release/tray-lang-intel.app
  UNSIGNED_ARM64_APP: ${{ github.workspace }}/build/Release/tray-lang-arm64.app
  UNIVERSAL_APP: ${{ github.workspace }}/build/Release/tray-lang-universal.app

jobs:
  build:
    runs-on: macos-15

    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable

    - name: Get version from project
      run: |
        VERSION=$(xcodebuild -project tray-lang.xcodeproj -showBuildSettings -configuration Release | awk -F' = ' '/MARKETING_VERSION/{print $2; exit}')
        echo "VERSION=$VERSION" >> "$GITHUB_ENV"
        echo "Building version: $VERSION"

    - name: Install signing certificate
      env:
        BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
        P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      run: |
        CERT_PATH="$RUNNER_TEMP/build_certificate.p12"
        KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

        echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o "$CERT_PATH"
        security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
        security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
        security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
        security import "$CERT_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
        security list-keychain -d user -s "$KEYCHAIN_PATH"
        security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
        security find-identity -v -p codesigning "$KEYCHAIN_PATH"

    - name: Clean and prepare
      run: |
        rm -rf build
        mkdir -p "$APP_OUTPUT_DIR"
        xcodebuild clean -project tray-lang.xcodeproj -scheme tray-lang -configuration Release

    - name: Build for Intel
      run: |
        xcodebuild \
          -project tray-lang.xcodeproj \
          -scheme tray-lang \
          -configuration Release \
          -destination 'platform=macOS,arch=x86_64' \
          -derivedDataPath "$DERIVED_DATA_INTEL" \
          build \
          CODE_SIGNING_ALLOWED=NO

        cp -R "$DERIVED_DATA_INTEL/Build/Products/Release/tray-lang.app" "$UNSIGNED_INTEL_APP"

    - name: Build for Apple Silicon
      run: |
        xcodebuild \
          -project tray-lang.xcodeproj \
          -scheme tray-lang \
          -configuration Release \
          -destination 'platform=macOS,arch=arm64' \
          -derivedDataPath "$DERIVED_DATA_ARM64" \
          build \
          CODE_SIGNING_ALLOWED=NO

        cp -R "$DERIVED_DATA_ARM64/Build/Products/Release/tray-lang.app" "$UNSIGNED_ARM64_APP"

    - name: Create universal app
      run: |
        lipo -create \
          "$UNSIGNED_INTEL_APP/Contents/MacOS/tray-lang" \
          "$UNSIGNED_ARM64_APP/Contents/MacOS/tray-lang" \
          -output "$APP_OUTPUT_DIR/tray-lang-universal-binary"

        cp -R "$UNSIGNED_INTEL_APP" "$UNIVERSAL_APP"
        cp "$APP_OUTPUT_DIR/tray-lang-universal-binary" "$UNIVERSAL_APP/Contents/MacOS/tray-lang"
        chmod +x "$UNIVERSAL_APP/Contents/MacOS/tray-lang"
        rm -f "$APP_OUTPUT_DIR/tray-lang-universal-binary"

    - name: Sign app
      run: |
        SIGNING_IDENTITY=$(security find-identity -v -p codesigning "$RUNNER_TEMP/app-signing.keychain-db" | awk -F'"' '/Developer ID Application/{print $2; exit}')
        if [ -z "$SIGNING_IDENTITY" ]; then
          echo "Developer ID Application identity not found in CI keychain"
          exit 1
        fi

        codesign --force --deep --options runtime \
          --entitlements tray-lang/tray_lang.entitlements \
          --sign "$SIGNING_IDENTITY" \
          "$UNIVERSAL_APP"

        codesign --verify --deep --strict --verbose=2 "$UNIVERSAL_APP"

    - name: Notarize app
      env:
        APPLE_ID: ${{ secrets.APPLE_ID }}
        APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      run: |
        ditto -c -k --keepParent "$UNIVERSAL_APP" "$APP_OUTPUT_DIR/tray-lang-notarize.zip"

        xcrun notarytool submit "$APP_OUTPUT_DIR/tray-lang-notarize.zip" \
          --apple-id "$APPLE_ID" \
          --password "$APPLE_APP_SPECIFIC_PASSWORD" \
          --team-id "$APPLE_TEAM_ID" \
          --wait

        xcrun stapler staple "$UNIVERSAL_APP"
        spctl -a -vv --type execute "$UNIVERSAL_APP"

    - name: Create DMG
      run: |
        if ! command -v create-dmg &> /dev/null; then
          brew install create-dmg
        fi

        rm -rf "$UNSIGNED_INTEL_APP" "$UNSIGNED_ARM64_APP"
        cp README.md "$APP_OUTPUT_DIR/"

        create-dmg \
          --volname "Tray Lang v$VERSION" \
          --window-pos 200 120 \
          --window-size 800 500 \
          --icon-size 100 \
          --icon "tray-lang-universal.app" 175 120 \
          --hide-extension "tray-lang-universal.app" \
          --app-drop-link 175 300 \
          "$APP_OUTPUT_DIR/Tray-Lang-v$VERSION-Universal.dmg" \
          "$APP_OUTPUT_DIR/"

    - name: Create Release
      uses: softprops/action-gh-release@v3
      with:
        tag_name: v${{ env.VERSION }}
        name: Tray Lang v${{ env.VERSION }}
        body: |
          ## Tray Lang v${{ env.VERSION }}

          Signed and notarized universal build.

          ### Installation
          1. Download and mount the DMG
          2. Move the app to Applications folder
          3. Grant accessibility permissions on first launch

          ### Files Included
          - `tray-lang-universal.app` - Universal macOS application
          - `README.md` - Installation and usage instructions

          ### System Requirements
          - macOS 15.0 or higher
          - Intel or Apple Silicon Mac
        files: |
          build/Release/Tray-Lang-v${{ env.VERSION }}-Universal.dmg
        draft: false
        prerelease: false
